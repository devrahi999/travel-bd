name: travel_bd
description: Bangladesh's first integrated travel super-app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # QR Code
  qr_flutter: ^4.1.0

  # Local Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.0.0

  # HTTP
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Image
  image_picker: ^1.1.2

  # Maps / Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  url_launcher: ^6.3.0

  # Charts
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  equatable: ^2.0.5
  uuid: ^4.4.2

  # Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2781.1
  http: ^1.6.0
  google_sign_in: ^6.2.1
  permission_handler: ^12.0.3
  supabase_flutter: ^2.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
